name: Deploy (Protected, Disabled By Default)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "vercel"
        type: choice
        options:
          - vercel
          - render
          - railway
          - aws

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Guarded Deploy (Safety Locked)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Safety lock (deployment disabled by default)
        id: safety
        run: |
          if [ "${{ secrets.DEPLOY_ENABLED }}" != "true" ]; then
            echo "Deployment lock is ON."
            echo "No cloud deployment will run until you set DEPLOY_ENABLED=true in repository secrets."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Block direct pushes to main
        if: steps.safety.outputs.enabled == 'true' && github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.workflow_run.head_sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            if (!prs.data || prs.data.length === 0) {
              core.setFailed(
                `Direct push detected for commit ${sha}. Deployment is blocked. Merge via PR only.`
              );
              return;
            }

            core.info(`Deployment allowed: commit ${sha} is associated with PR #${prs.data[0].number}.`);

      - name: Checkout repository
        if: steps.safety.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Build frontend artifact
        if: steps.safety.outputs.enabled == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prepare backend package
        if: steps.safety.outputs.enabled == 'true'
        working-directory: backend
        run: |
          python -m venv .venv-ci
          . .venv-ci/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Vercel (frontend)
        if: steps.safety.outputs.enabled == 'true' && github.event.inputs.target == 'vercel'
        run: |
          echo "Vercel deploy command is configured but intentionally not executed automatically."
          echo "Enable with DEPLOY_ENABLED=true and add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets."

      - name: Deploy to Render (backend/frontend)
        if: steps.safety.outputs.enabled == 'true' && github.event.inputs.target == 'render'
        run: |
          echo "Render deploy command is configured but intentionally not executed automatically."
          echo "Enable with DEPLOY_ENABLED=true and add RENDER_API_KEY and service IDs as secrets."

      - name: Deploy to Railway
        if: steps.safety.outputs.enabled == 'true' && github.event.inputs.target == 'railway'
        run: |
          echo "Railway deploy command is configured but intentionally not executed automatically."
          echo "Enable with DEPLOY_ENABLED=true and add RAILWAY_TOKEN secret."

      - name: Deploy to AWS
        if: steps.safety.outputs.enabled == 'true' && github.event.inputs.target == 'aws'
        run: |
          echo "AWS deploy command is configured but intentionally not executed automatically."
          echo "Enable with DEPLOY_ENABLED=true and add AWS credentials/secrets."

      - name: Deployment summary
        run: |
          echo "Protected deploy workflow executed safely."
          echo "No cloud deployment happened unless DEPLOY_ENABLED=true."
